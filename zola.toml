# The URL the site will be built for
base_url = "https://oxidhome.info"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = false

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

# Site title — used in <title>, headings, and feed metadata
title = "OxidHome"

# One-line description — used in <meta name="description"> and feeds
description = "Home automation, forged in Rust"

# Whether to generate Atom feeds for sections that opt in
generate_feeds = true

# Markdown rendering options
[markdown]

# Syntax highlighting for fenced code blocks
[markdown.highlighting]
theme = "catppuccin-mocha"

# Custom variables exposed to templates as `config.extra.*`
[extra]
logo = "/logo-400.png"
