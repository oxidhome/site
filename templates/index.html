{% extends "base.html" %}

{% block title %}{{ config.title }} — {{ config.description }}{% endblock %}

{% block content %}
<section class="hero">
    <img src="/logo.svg" alt="{{ config.title }}">
    <h1>{{ config.title }}</h1>
    <p class="tagline">{{ config.description }}</p>
    <span class="under-construction">under construction</span>
</section>

{{ section.content | safe }}
{% endblock %}
