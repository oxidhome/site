<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OxidHome — Home automation, forged in Rust</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background: #0d0d0d;
            color: #c5c8c6;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }

        main {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        img {
            width: 200px;
            max-width: 60vw;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin: 0 0 0.5rem;
        }

        p {
            color: #8a8f8a;
        }
    </style>
</head>
<body>
<main>
    <img src="/logo.svg" alt="oxidhome">
    <h1>OxidHome</h1>
    <p>Home automation, forged in Rust</p>
    <b>under construction</b>
</main>
</body>
</html>
