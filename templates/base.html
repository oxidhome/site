<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ config.title }}{% endblock %}</title>
    <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/site.css">
</head>
<body>
<header>
    <a href="/" class="brand">
        <img src="/logo.svg" alt="{{ config.title }}">
        <span>{{ config.title }}</span>
    </a>
    {%- set path = current_path | default(value="/") -%}
    <nav>
        <a href="/news/"{% if path is starting_with("/news") %} aria-current="page"{% endif %}>News</a>
        <a href="/discussions/"{% if path is starting_with("/discussions") %} aria-current="page"{% endif %}>Discussions</a>
        <a href="https://github.com/oxidhome" rel="external noopener">GitHub</a>
    </nav>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
