name: CI
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      ZOLA_IMAGE: ghcr.io/getzola/zola:v0.22.1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Check site
        run: docker run --rm -v "$GITHUB_WORKSPACE:/app" --workdir /app "$ZOLA_IMAGE" check

      - name: Build site
        run: docker run --rm -v "$GITHUB_WORKSPACE:/app" --workdir /app "$ZOLA_IMAGE" build
